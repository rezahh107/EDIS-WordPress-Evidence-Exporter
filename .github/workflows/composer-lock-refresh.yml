name: EDIS Composer lock refresh

'on':
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: json, iconv
      - name: Refresh and validate lockfile
        run: |
          composer update --lock --no-interaction --prefer-dist --no-progress
          composer validate --strict
      - name: Commit refreshed lockfile
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add composer.lock
          if git diff --cached --quiet; then
            echo 'composer.lock is already current.'
            exit 0
          fi
          git commit -m 'build: refresh Composer lockfile'
          git push origin "HEAD:${HEAD_REF}"
