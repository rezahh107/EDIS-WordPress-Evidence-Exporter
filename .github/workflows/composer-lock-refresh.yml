name: EDIS Composer lock gate

'on':
  push:
  pull_request:

permissions:
  contents: read

jobs:
  composer-lock:
    name: Composer metadata and lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: json, iconv
      - run: test -f composer.lock
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-progress --dry-run
      - run: composer audit --locked
