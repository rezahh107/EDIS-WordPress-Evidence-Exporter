name: EDIS composer lock bootstrap

'on':
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  composer-lock:
    if: github.actor != 'github-actions[bot]'
    name: Generate and commit composer.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: json, iconv
      - name: Resolve Composer lock
        run: composer update --no-interaction --prefer-dist --no-progress
      - name: Commit Composer lock and validation evidence
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set +e
          composer validate --strict > composer-validate.log 2>&1
          VALIDATE_EXIT=$?
          set -e
          printf '\nexit_code=%s\n' "$VALIDATE_EXIT" >> composer-validate.log
          printf 'composer.lock sha256: %s\n' "$(sha256sum composer.lock | cut -d' ' -f1)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add composer.lock composer-validate.log
          if git diff --cached --quiet; then
            echo 'Composer evidence is already current.'
            exit 0
          fi
          git commit -m 'build: add Composer lock and validation evidence'
          git push origin "HEAD:${HEAD_REF}"
