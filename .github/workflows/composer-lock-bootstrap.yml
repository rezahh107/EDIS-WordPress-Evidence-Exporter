name: EDIS composer lock bootstrap

'on':
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  composer-lock:
    name: Generate composer.lock evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: json, iconv
      - name: Resolve Composer lock
        run: composer update --no-interaction --prefer-dist --no-progress
      - name: Emit Composer lock evidence
        run: |
          printf 'EDIS_COMPOSER_LOCK_SHA256=%s\n' "$(sha256sum composer.lock | cut -d' ' -f1)"
          printf 'EDIS_COMPOSER_LOCK_BASE64_BEGIN\n'
          base64 -w0 composer.lock
          printf '\nEDIS_COMPOSER_LOCK_BASE64_END\n'
