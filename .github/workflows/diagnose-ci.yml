name: EDIS CI diagnostics

'on':
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpcs-diagnostic:
    name: PHPCS diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: json, iconv
      - run: composer install --no-interaction --prefer-dist --no-progress
      - id: scan
        shell: bash
        run: |
          set +e
          vendor/bin/phpcs --standard=phpcs.xml.dist --report=json > /tmp/phpcs.json
          status=$?
          summary=$(php -r '$d=json_decode(file_get_contents("/tmp/phpcs.json"),true);$o=[];foreach(($d["files"]??[]) as $f=>$i){foreach(($i["messages"]??[]) as $m){$o[]=basename($f).":".($m["line"]??0).":".($m["source"]??"unknown");if(count($o)>=6){break 2;}}}echo $o?implode("|",$o):"PASS";' | cut -c1-240)
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'summary=%s\n' "$summary" >> "$GITHUB_OUTPUT"
          exit 0
      - name: PHPCS ${{ steps.scan.outputs.summary }}
        run: test '${{ steps.scan.outputs.status }}' -eq 0

  multisite-diagnostic:
    name: Multisite create diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mysqli, json, iconv
      - name: Install verified WP-CLI 2.12.0
        env:
          WP_CLI_SHA512: be928f6b8ca1e8dfb9d2f4b75a13aa4aee0896f8a9a0a1c45cd5d2c98605e6172e6d014dda2e27f88c98befc16c040cbb2bd1bfa121510ea5cdf5f6a30fe8832
        run: |
          curl -fsSLo /tmp/wp-cli.phar https://github.com/wp-cli/wp-cli/releases/download/v2.12.0/wp-cli-2.12.0.phar
          printf '%s  %s\n' "$WP_CLI_SHA512" /tmp/wp-cli.phar | sha512sum --check --strict
          chmod +x /tmp/wp-cli.phar
          sudo mv /tmp/wp-cli.phar /usr/local/bin/wp
      - name: Install WordPress multisite
        run: |
          wp core download --path=/tmp/wordpress --version=7.0 --force
          wp config create --path=/tmp/wordpress --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --dbhost=127.0.0.1:3306
          wp core install --path=/tmp/wordpress --url=http://localhost --title=EDIS --admin_user=admin --admin_password=admin --admin_email=admin@example.test --skip-email
          wp core multisite-convert --path=/tmp/wordpress --title='EDIS Network' --base=/
      - id: create
        shell: bash
        run: |
          set +e
          output=$(wp site create --path=/tmp/wordpress --url=http://localhost --slug=site-two --title='Site Two' --email=admin@example.test --porcelain 2>&1)
          status=$?
          summary=$(printf '%s' "$output" | tr '\n' ' ' | tr -cd '[:alnum:] _./:@=-' | cut -c1-220)
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'summary=%s\n' "$summary" >> "$GITHUB_OUTPUT"
          exit 0
      - name: SITE CREATE ${{ steps.create.outputs.summary }}
        run: test '${{ steps.create.outputs.status }}' -eq 0
